name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://huggingface.co/spaces/poojanparekh-26/ai-voice-detector hf-space
          rsync -av --delete ./ hf-space/ --exclude .git
          cd hf-space

          git add .
          git commit -m "Sync from GitHub" || echo "No changes"
          git push https://poojanparekh-26:$HF_TOKEN@huggingface.co/spaces/poojanparekh-26/ai-voice-detector main
